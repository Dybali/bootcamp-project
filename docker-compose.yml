services:
  postgres:
    image: postgres:16
    container_name: bootcamp-postgres
    environment:
      POSTGRES_DB: bootcampdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - bootcamp_postgres_data:/var/lib/postgresql/data

volumes:
  bootcamp_postgres_data:
